<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สำหรับคนพิเศษ ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#ff758c,#ff7eb3);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    z-index:10;
    opacity:0;
    touch-action: pan-y;
    overflow-y:auto;
    padding-top:20px;
}

.active{
    display:flex;
    animation:fadeIn 0.6s ease-in-out forwards;
}

.page.fade-out,
#buttonsContainer.fade-out{
    animation:fadeOut 0.6s ease-in-out forwards;
}

.card{
    background:white;
    color:#333;
    padding:32px;
    border-radius:25px;
    width:min(92vw,420px);
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.sweet{
    max-width:92vw;
    font-size:22px;
    line-height:1.8;
    padding:18px;
}

#resultMessage{
    opacity:0;
}

#resultMessage.fade-in{
    animation:fadeIn 0.6s ease-in-out forwards;
}

.card h2{
    color:#ff4d88;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
}

button{
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

.btn{
    background:#ff4d88;
    color:white;
    padding:12px 30px;
    font-size:18px;
}

.btn:hover{
    transform:scale(1.05);
}

h1{
    font-size:55px;
    text-shadow:0 0 15px rgba(255,255,255,.7);
}

.sweet{
    max-width:700px;
    font-size:24px;
    line-height:1.8;
    padding:20px;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    position:relative;
}

.yes{
    background:#ff4d88;
    color:white;
    padding:15px 45px;
    font-size:24px;
}

.no{
    background:white;
    color:#ff4d88;
    padding:15px 45px;
    font-size:24px;
    position:relative;
}

.heart{
    position:fixed;
    bottom:-50px;
    animation:float linear forwards;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeOut{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-20px);
    }
}

@media (max-width: 720px) {
    body{
        min-height:100vh;
        height:auto;
        padding:20px 0;
    }

    .page{
        align-items:flex-start;
        justify-content:flex-start;
        padding-top:30px;
    }

    .card{
        padding:24px;
        width:min(94vw,400px);
        margin:0 auto;
    }

    h1{
        font-size:42px;
    }

    .sweet{
        font-size:20px;
        padding:14px;
    }

    .btn{
        padding:12px 24px;
        font-size:17px;
    }

    .yes,
    .no{
        padding:14px 32px;
        font-size:20px;
    }

    .buttons{
        flex-direction:column;
        gap:14px;
    }
}

@media (min-width: 1024px) {
    .card{
        width:420px;
    }

    .sweet{
        max-width:700px;
    }
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div class="page active" id="page1">
    <div class="card">
        <h2>💖 เข้าสู่หัวใจของเรา 💖</h2>
        <p style="color:#555; font-size:16px; line-height:1.7; margin-bottom:18px;">กรอกชื่อและรหัสผ่านเพื่อเปิดประตูไปยังคำพูดซึ้ง ๆ ที่เราเตรียมไว้ให้คุณโดยเฉพาะ</p>
        <input type="text" id="name" placeholder="ชื่อ">

        <input type="password" id="password" placeholder="รหัสผ่าน">

        <button class="btn" onclick="login()">
            เข้าสู่ระบบ ❤️
        </button>
    </div>
</div>

<!-- SWEET -->
<div class="page" id="page2">
    <h1>💞</h1>

    <div class="sweet" id="sweetText"></div>

    <br>

    <button class="btn" onclick="nextPage()">
        ต่อไป ➜
    </button>
</div>

<!-- QUESTION -->
<div class="page" id="page3">
    <h1>❤️ เป็นแฟนกันมั้ย ❤️</h1>

    <div class="buttons" id="buttonsContainer">
        <button class="yes" onclick="yesAnswer()">
            เป็น 💖
        </button>

        <button class="no" id="noBtn" onclick="noAnswer()">
            ไม่เป็น 😢
        </button>
    </div>
    <div id="resultMessage" class="sweet" style="display:none; margin-top:20px; color:white; background:rgba(255,255,255,0.12); border-radius:20px; padding:18px;"></div>
</div>

<script>

const bgMusic = document.getElementById('bgMusic');
const hookStart = 149; // เริ่มท่อนที่นาที 2:29 (149 วินาที)
const hookEnd = 180; // จบท่อนที่นาที 3:00 (180 วินาที)

if (bgMusic) {
    bgMusic.loop = false;
    bgMusic.addEventListener('loadedmetadata', () => {
        if (bgMusic.duration > hookStart) {
            bgMusic.currentTime = hookStart;
        }
    });

    bgMusic.addEventListener('timeupdate', () => {
        if (bgMusic.currentTime >= hookEnd) {
            bgMusic.currentTime = hookStart;
        }
    });
}

function playMusic(){
    if (!bgMusic) return;
    bgMusic.volume = 0.8;
    if (bgMusic.duration > hookStart) {
        bgMusic.currentTime = hookStart;
    }
    bgMusic.play().catch(() => {
        // Autoplay may be blocked; it will start when the user interacts.
    });
}

function login(){

    let name = document.getElementById("name").value;
    let password = document.getElementById("password").value;

    if(name !== "ริส" || password !== "140849"){
        alert("ชื่อหรือรหัสผ่านไม่ถูกต้อง");
        return;
    }

    const page1 = document.getElementById("page1");
    const page2 = document.getElementById("page2");
    
    page1.classList.add("fade-out");
    
    setTimeout(() => {
        page1.classList.remove("active", "fade-out");
        page2.classList.add("active");
        playMusic();
    }, 800);

    document.getElementById("sweetText").innerHTML = `
        ถึง ${name} ❤️<br><br>

        ทุกครั้งที่คิดถึงเธอ หัวใจของฉันจะอุ่นขึ้นเหมือนมีแสงดาวส่องในคืนที่มืดมิด ✨<br><br>

        เธอทำให้เรื่องธรรมดาๆ กลายเป็นความพิเศษ และทำให้วันที่เหนื่อยล้ากลับมีรอยยิ้มบริสุทธิ์ 😊<br><br>

        ขอบคุณที่อยู่ตรงนี้ ทั้งที่ไม่ได้ขอ และขอบคุณที่ทำให้ฉันกล้าพูดความรู้สึกทั้งหมดออกไป 💕<br><br>

        ในใจฉันมีคำถามหนึ่งที่เก็บไว้นานมาก...<br>
        วันนี้อยากให้เธอได้ยินมันอย่างเต็มคำ ❤️
        `;
}

function switchPage(fromId, toId){
    const fromPage = document.getElementById(fromId);
    const toPage = document.getElementById(toId);

    fromPage.classList.add("fade-out");

    setTimeout(() => {
        fromPage.classList.remove("active", "fade-out");
        toPage.classList.add("active");
    }, 600);
}

function nextPage(){
    switchPage("page2", "page3");
}

function handleSwipe(fromPage, toPage){
    if (!fromPage || !toPage) return;
    switchPage(fromPage, toPage);
}

let touchStartY = 0;
let touchEndY = 0;

document.addEventListener('touchstart', (event) => {
    touchStartY = event.changedTouches[0].screenY;
});

document.addEventListener('touchend', (event) => {
    touchEndY = event.changedTouches[0].screenY;
    const currentPage = document.querySelector('.page.active');
    const deltaY = touchStartY - touchEndY;

    if (Math.abs(deltaY) < 50 || !currentPage) return;

    if (deltaY > 0) {
        if (currentPage.id === 'page2') handleSwipe('page2', 'page3');
    } else {
        if (currentPage.id === 'page3') handleSwipe('page3', 'page2');
        if (currentPage.id === 'page2') handleSwipe('page2', 'page1');
    }
});

function yesAnswer(){
    const buttonsContainer = document.getElementById('buttonsContainer');
    const resultMessage = document.getElementById('resultMessage');
    
    buttonsContainer.classList.add("fade-out");
    
    setTimeout(() => {
        buttonsContainer.style.display = 'none';
        resultMessage.style.display = 'block';
        resultMessage.innerHTML = `
            <h1> ขอบคุณที่ให้โอกาศนะ </h1>
            <p>จากนี้ขอเก็บทุกครั้งที่เราได้หัวเราะ ได้คุยกัน และได้อยู่ด้วยกันไว้ในหัวใจ</p>
            <p>เธอเป็นคนพิเศษสำหรับฉันที่สุด ❤️</p>
            <p>ยินดีต้อนรับเข้าสู่เรื่องราวความรักที่เราจะเขียนร่วมกัน 💖</p>
        `;
        resultMessage.classList.add("fade-in");
        playMusic();
    }, 800);
}

function noAnswer(){
    const pageTitle = document.querySelector('#page3 h1');
    const buttonsContainer = document.getElementById('buttonsContainer');
    const resultMessage = document.getElementById('resultMessage');
    
    buttonsContainer.classList.add("fade-out");
    
    setTimeout(() => {
        pageTitle.textContent = '💔 ขอบคุณที่ให้ความรู้สึก 💔';
        buttonsContainer.style.display = 'none';
        resultMessage.style.display = 'block';
        resultMessage.innerHTML = `
            <p>ถึงคำตอบจะไม่ใช่อย่างที่หวัง</p>
            <p>แต่เราก็ยังดีใจที่ได้บอกความรู้สึกทั้งหมดออกไป</p>
            <p>ขอบคุณที่เข้ามาเป็นรอยยิ้ม เป็นความสุข</p>
            <p>และเป็นความทรงจำดี ๆ ในชีวิตของเรา</p>
            <p>แม้วันนี้เราจะยังไม่ใช่คู่ชีวิตกัน แต่วินาทีนี้ทำให้ฉันกล้าหวัง และกล้ารักอย่างจริงใจ</p>
        `;
        resultMessage.classList.add("fade-in");
        playMusic();
    }, 800);
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    const x = Math.random() * 20 - 10;
    const y = Math.random() * 10 - 5;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*40)+"px";
    heart.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
